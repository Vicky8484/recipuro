<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipes</title>

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/opskrifter.css" />

    <link rel="icon" type="image/png" sizes="32x32" href="img-vid/recipuro-favicon.webp">

    <script src="js/menu.js" defer></script>
    <script src="js/opskrifter.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="img-vid/recipurologo.webp" alt="Logo">
            </a>
        </div>

        <nav>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="opskrifter.html">Recipes</a></li>
                <li><a>Send recipe</a></li>
            </ul>

            <button class="burger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </button>
        </nav>
    </header>

    <main>


        <div class="main-box">
            <div id="sidepanel">
                <div class="spSection1">
                    <div class="dropdown">
                        <button id="dropBtn" class="dropbtn button greenBtn">Filters</button>

                        <div id="myDropdown" class="dropdown-content">
                            <button class="filterBtn button" id="filterByPrep">Under 20 min prep</button>
                            <button class="filterBtn button" id="filterByCook">Under 20 min cooking</button>
                            <button class="filterBtn button" id="filterByLess">4 servings or less</button>
                            <button class="filterBtn button" id="filterByMore">4 servings or more</button>
                            <button class="filterBtn button" id="filterByIngredients">Under 10 ingredients</button>
                            <button class="filterBtn button" id="filterByIngredients2">Over 10 ingredients</button>
                            <button class="filterBtn button" id="filterByCalories">Under 300 calories</button>
                            <button class="filterBtn button" id="filterByCalories2">Over 300 calories</button>
                        </div>
                    </div>

                    <button class="button greenBtn" id="resetBtn">Show all</button>
                </div>

                <div class="spSection3">
                    <h3>Vær med!</h3>
                    <p class="indsendInfo">Send a recipe for a delicious meal, snack or dessert and keep up on Instagram
                        to see if your recipe gets Recipe of the Month!</p>
                    <a href="" class="yellowBtn button">Send recipe</a>
                </div>
            </div>
            <div>
                <section id="recipe-box">

                </section>
            </div>
        </div>
    </main>

    <footer>
        <div class="footerInfo-box">
            <p>Email: easypeacyfood@gmail.com</p>
            <p>Phone number: 12 34 56 78</p>
            <p>Recipuro HQ: Lynghamarvej 9</p>
        </div>
    </footer>
</body>

</html>
